<!DOCTYPE html>
<html>
<head>
<title>Top Up Free Fire</title>
</head>

<body>

<h2>Free Fire 🔥</h2>

<input type="text" id="idgame" placeholder="Masukkan ID"><br><br>

<select id="nominal">
  <option>70 Diamond - 10.000</option>
  <option>140 Diamond - 20.000</option>
</select><br><br>

<button onclick="order()">Order</button>

<script>
function order() {
  var id = document.getElementById("idgame").value;
  var nominal = document.getElementById("nominal").value;

  var pesan = "Top Up FF\nID: " + id +
              "\nNominal: " + nominal;

  var nomor = "6285136564872";

  var url = "https://wa.me/" + nomor + "?text=" + encodeURIComponent(pesan);

  window.open(url, '_blank');
}
</script>

</body>
</html>
