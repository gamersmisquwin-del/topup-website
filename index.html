<!DOCTYPE html>
<html>
<head>
<title>Top Up Game Murah</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  text-align: center;
}

h2 {
  color: #22c55e;
}

.game img {
  width: 110px;
  margin: 10px;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.2s;
}

.game img:hover {
  transform: scale(1.1);
}

.box {
  margin-top: 20px;
}

input, select {
  padding: 10px;
  margin: 8px;
  border-radius: 8px;
  border: none;
  width: 230px;
}

button {
  background: #22c55e;
  color: white;
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>🔥 Top Up Game Murah 🔥</h2>
<p>⚡ Proses cepat 1-5 menit</p>

<!-- GAMBAR GAME -->
<div class="game">
  <img src="https://upload.wikimedia.org/wikipedia/en/0/0c/Free_Fire_Logo.png" onclick="pilihGame('Free Fire')">
  <img src="https://upload.wikimedia.org/wikipedia/en/4/4e/Mobile_Legends_Bang_Bang_logo.png" onclick="pilihGame('Mobile Legends')">
  <img src="https://upload.wikimedia.org/wikipedia/en/4/44/PUBG_Mobile_logo.png" onclick="pilihGame('PUBG Mobile')">
</div>

<h3 id="gameDipilih">Pilih Game Dulu 👆</h3>

<div class="box">

<label>ID Game:</label><br>
<input type="text" id="idgame" placeholder="Masukkan ID"><br><br>

<label>Pilih Nominal:</label><br>
<select id="nominal"></select><br><br>

<h3>Pembayaran</h3>
<p>DANA / OVO / GoPay</p>

<button onclick="kirim()">Order Sekarang</button>

</div>

<script>
var game = "";

function pilihGame(g) {
  game = g;
  document.getElementById("gameDipilih").innerText = "Game: " + g;

  var nominal = document.getElementById("nominal");
  nominal.innerHTML = "";

  if (g == "Free Fire") {
    nominal.innerHTML += "<option>70 Diamond - 10.000</option>";
    nominal.innerHTML += "<option>140 Diamond - 20.000</option>";
  }

  if (g == "Mobile Legends") {
    nominal.innerHTML += "<option>86 Diamond - 15.000</option>";
    nominal.innerHTML += "<option>172 Diamond - 30.000</option>";
  }

  if (g == "PUBG Mobile") {
    nominal.innerHTML += "<option>60 UC - 15.000</option>";
    nominal.innerHTML += "<option>120 UC - 30.000</option>";
  }
}

function kirim() {
  var id = document.getElementById("idgame").value;
  var nominal = document.getElementById("nominal").value;

  if (game == "" || id == "" || nominal == "") {
    alert("Isi dulu semua data bro!");
    return;
  }

  var pesan = "Halo kak, saya mau top up\n" +
              "Game: " + game +
              "\nID: " + id +
              "\nNominal: " + nominal +
              "\n\nPembayaran: DANA / OVO / GoPay";

  var nomor = "6285136564872";

  var url = "https://wa.me/" + nomor + "?text=" + encodeURIComponent(pesan);

  window.open(url, '_blank');
}
</script>

</body>
  </html>
