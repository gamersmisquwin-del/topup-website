<!DOCTYPE html>
<html>
<head>
<title>Hedon Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;
  overflow: hidden;
  background: radial-gradient(circle at top, #1e293b, #020617);
}

/* glow */
.bg-glow {
  position: absolute;
  width: 400px;
  height: 400px;
  background: #22c55e;
  filter: blur(150px);
  top: -100px;
  left: -100px;
  opacity: 0.4;
}

/* gambar */
.bg-img {
  position: absolute;
  width: 250px;
  bottom: 0;
  right: 20px;
  animation: float 4s infinite;
}

@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
  100% { transform: translateY(0); }
}

.container {
  margin-top: 150px;
  position: relative;
}

h1 {
  color: #22c55e;
  text-shadow: 0 0 15px #22c55e;
}

button {
  margin-top: 20px;
  padding: 15px 30px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: white;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="bg-glow"></div>

<img class="bg-img" src="https://i.ibb.co/4pDNDk1/gamer.png">

<div class="container">
  <h1>🔥 HEDON STORE 🔥</h1>
  <p>Top Up Murah • Cepat • Aman</p>

  <a href="game.html">
    <button>Masuk</button>
  </a>
</div>

</body>
</html>
