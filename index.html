<!DOCTYPE html>
<html>
<head>
<title>Hedon Top Up Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
  text-align: center;
}

/* HEADER */
.header {
  padding: 20px;
  font-size: 24px;
  color: #22c55e;
  text-shadow: 0 0 10px #22c55e;
}

/* CARD */
.card {
  background: #020617;
  padding: 15px;
  margin: 10px;
  border-radius: 15px;
  display: inline-block;
  width: 140px;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 0 10px #22c55e33;
}

.card:hover {
  transform: scale(1.08);
  box-shadow: 0 0 25px #22c55e;
}

/* FORM */
.box {
  margin-top: 20px;
}

input, select {
  padding: 12px;
  margin: 10px;
  border-radius: 10px;
  border: none;
  width: 240px;
  background: #0f172a;
  color: white;
}

/* BUTTON */
button {
  background: linear-gradient(45deg, #e1306c, #fd1d1d);
  padding: 14px 25px;
  border: none;
  border-radius: 12px;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #e1306c;
}

/* STATUS */
.status {
  margin-top: 10px;
  color: #4ade80;
}

/* NOTE */
.note {
  font-size: 13px;
  opacity: 0.7;
}
</style>
</head>

<p>Order via Instagram DM 📩</p>

</div>

<p class="note">Setelah klik, kirim format order di DM ya</p>

</div>

    nominal.innerHTML += "<option>60 UC - 15.000</option>";

  }
}
