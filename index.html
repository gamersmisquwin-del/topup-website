<!DOCTYPE html>  <html>  
<head>  
<title>Top Up Game Murah</title>  <style>  
body {  
  background: #0f172a;  
  color: white;  
  font-family: Arial;  
  text-align: center;  
}  
  
h2 {  
  color: #22c55e;  
}  
  
.game img {  
  width: 100px;  
  margin: 10px;  
  border-radius: 12px;  
  cursor: pointer;  
}  
  
.box {  
  margin-top: 20px;  
}  
  
input, select {  
  padding: 10px;  
  margin: 8px;  
  border-radius: 8px;  
  border: none;  
  width: 220px;  
}  
  
button {  
  background: #22c55e;  
  color: white;  
  padding: 12px 20px;  
  border: none;  
  border-radius: 10px;  
  font-size: 16px;  
  cursor: pointer;  
}  
</style>  </head>  <body>  <h2>🔥 Top Up Game Murah 🔥</h2>  
<p>⚡ Proses cepat 1-5 menit</p>  <!-- PILIH GAME -->  <div class="game">  
  <img src="https://i.ibb.co/7pK0p6D/ff.png" onclick="pilihGame('Free Fire')">  
  <img src="https://i.ibb.co/4f6X6KZ/ml.png" onclick="pilihGame('Mobile Legends')">  
  <img src="https://i.ibb.co/Fh3YFhM/pubg.png" onclick="pilihGame('PUBG Mobile')">  
</div>  <p id="gameDipilih">Game: -</p>  <div class="box">  <label>ID Game:</label><br>
<input type="text" id="idgame" placeholder="Masukkan ID"><br><br>

<label>Pilih Nominal:</label><br>
<select id="nominal"></select><br><br>

<h3>Pembayaran</h3>  
<p>DANA / OVO / Gopay</p>  <button onclick="kirim()">Order Sekarang</button>

</div>  <script>  
var game = "";  
  
function pilihGame(g) {  
  game = g;  
  document.getElementById("gameDipilih").innerText = "Game: " + g;  
  
  var nominal = document.getElementById("nominal");  
  nominal.innerHTML = "";  
  
  if (g == "Free Fire") {  
    nominal.innerHTML += "<option>70 Diamond - 10.000</option>";  
    nominal.innerHTML += "<option>140 Diamond - 20.000</option>";  
  }  
  
  if (g == "Mobile Legends") {  
    nominal.innerHTML += "<option>86 Diamond - 15.000</option>";  
    nominal.innerHTML += "<option>172 Diamond - 30.000</option>";  
  }  
  
  if (g == "PUBG Mobile") {  
    nominal.innerHTML += "<option>60 UC - 15.000</option>";  
    nominal.innerHTML += "<option>120 UC - 30.000</option>";  
  }  
}  
  
function kirim() {  
  var id = document.getElementById("idgame").value;  
  var nominal = document.getElementById("nominal").value;  
  
  if (game == "" || id == "" || nominal == "") {  
    alert("Isi dulu semua data bro!");  
    return;  
  }  
  
  var pesan = "Halo, saya mau top up:\nGame: " + game +  
              "\nID: " + id +  
              "\nNominal: " + nominal;  
  
  var nomor = "6285136564872";
  
  var url = "https://wa.me/" + nomor + "?text=" + encodeURIComponent(pesan);  
  
  window.open(url, '_blank');  
}  
</script>  </body>  
  </html>
