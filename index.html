<!DOCTYPE html>
<html>
<head>
<title>Gamersmisquwin Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;
  overflow: hidden;
  background: radial-gradient(circle at top, #1e293b, #020617);
}

/* GAMBAR BACKGROUND */
.bg-img {
  position: absolute;
  width: 300px;
  bottom: 0;
  right: 20px;
  opacity: 0.9;
  animation: float 4s ease-in-out infinite;
}

/* ANIMASI NAIK TURUN */
@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
  100% { transform: translateY(0); }
}

/* GLOW */
.bg-glow {
  position: absolute;
  width: 400px;
  height: 400px;
  background: #22c55e;
  filter: blur(150px);
  top: -100px;
  left: -100px;
  opacity: 0.4;
}

/* CONTENT */
.container {
  position: relative;
  margin-top: 150px;
}

h1 {
  font-size: 32px;
  color: #22c55e;
  text-shadow: 0 0 15px #22c55e;
}

button {
  margin-top: 30px;
  padding: 15px 30px;
  background: linear-gradient(45deg, #22c55e, #4ade80);
  border: none;
  border-radius: 12px;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px #22c55e;
}
</style>
</head>

<body>

<!-- GLOW -->
<div class="bg-glow"></div>
